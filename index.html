<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🌐Мої посилання</title>

<style>
body{
    margin:0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg,#f7f0ff,#ffe6f2);
    display:flex;
    justify-content:center;
    min-height:100vh;
}

.container{
    width:90%;
    max-width:800px;
    background:#fff;
    padding:25px;
    border-radius:20px;
    margin:20px 0;
    box-shadow:0 10px 30px rgba(0,0,0,0.1);
}

h1{
    text-align:center;
    color:#6a3df0;
}

.add-box{
    display:flex;
    gap:10px;
    margin-bottom:20px;
}

.add-box input{
    flex:1;
    padding:10px;
    border-radius:10px;
    border:1px solid #ddd;
}

.add-box button{
    background:#6a3df0;
    color:white;
    border:none;
    padding:10px 15px;
    border-radius:10px;
    cursor:pointer;
}

.link-card{
    border:1px solid #eee;
    border-radius:15px;
    padding:15px;
    margin:15px 0;
    background:#fafaff;
}

.top-row{
    display:flex;
    align-items:center;
    gap:10px;
}

.favicon{
    width:32px;
    height:32px;
}

a{
    color:#333;
    font-weight:bold;
    text-decoration:none;
}

.actions{
    margin-top:10px;
    display:flex;
    gap:10px;
    flex-wrap:wrap;
}

button{
    padding:6px 10px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    background:#6a3df0;
    color:white;
    font-size:12px;
}

/* ⭐ ЛЕДЬ ПОМІТНА КНОПКА ВИДАЛЕННЯ */
.delete-btn{
    background:transparent;
    color:#bdbdbd;
    font-size:16px;
    padding:4px 6px;
    border:none;
    cursor:pointer;
    opacity:0.5;
    transition:0.2s;
}

.delete-btn:hover{
    opacity:1;
    color:#8c8c8c;
}

.note-box{
    margin-top:10px;
    background:#fff;
    padding:10px;
    border-radius:10px;
    border:1px solid #eee;
}

.note{
    display:flex;
    justify-content:space-between;
    background:#f3f3ff;
    padding:6px;
    margin-top:5px;
    border-radius:8px;
    font-size:13px;
}

.preview-img{
    margin-top:10px;
    max-width:150px;
    border-radius:10px;
}

.footer{
    text-align:center;
    margin-top:20px;
    font-size:12px;
    color:#888;
}
</style>
</head>

<body>

<div class="container">

<h1>🌐Мої посилання</h1>

<div class="add-box">
    <input id="newUrl" placeholder="Встав посилання (https://...)">
    <button onclick="addSite()">➕ Додати сайт</button>
</div>

<div id="list"></div>

<div class="footer">© 2026 Мої ресурси</div>
</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<script>

const firebaseConfig = {
  apiKey: "AIzaSyAccAxcis95_-So-VZivM7D1ene56Eq-x0",
  authDomain: "mylinks-1f843.firebaseapp.com",
  projectId: "mylinks-1f843",
  storageBucket: "mylinks-1f843.firebasestorage.app",
  messagingSenderId: "138024507959",
  appId: "1:138024507959:web:38d54a425786f4669a3db2",
  measurementId: "G-LRDQYTHY4P"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const col = db.collection("links");

// ADD SITE
function addSite(){
    const input = document.getElementById("newUrl");
    const url = input.value.trim();

    if(!url){
        alert("Встав посилання!");
        return;
    }

    const id = btoa(url);

    col.doc(id).set({
        url,
        notes: [],
        image: null,
        created: Date.now()
    });

    input.value = "";
}

// DELETE SITE
function deleteSite(id){
    if(confirm("Видалити цей сайт повністю?")){
        col.doc(id).delete();
    }
}

// NOTES
function addNote(id){
    const text = prompt("Введіть нотатку:");
    if(!text) return;

    col.doc(id).get().then(doc=>{
        const data = doc.data();
        data.notes.push({text});
        col.doc(id).update({notes:data.notes});
    });
}

function deleteNote(id,index){
    col.doc(id).get().then(doc=>{
        const data = doc.data();
        data.notes.splice(index,1);
        col.doc(id).update({notes:data.notes});
    });
}

// IMAGE
function uploadImage(event,id){
    const file = event.target.files[0];
    if(!file) return;

    const reader = new FileReader();
    reader.onload = e=>{
        col.doc(id).update({image:e.target.result});
    };
    reader.readAsDataURL(file);
}

function deleteImage(id){
    col.doc(id).update({image:null});
}

// REALTIME
col.onSnapshot(snapshot=>{
    const list = document.getElementById("list");
    list.innerHTML = "";

    snapshot.forEach(doc=>{
        const d = doc.data();

        const domain = new URL(d.url).hostname;
        const favicon = `https://www.google.com/s2/favicons?sz=64&domain=${domain}`;

        const div = document.createElement("div");
        div.className = "link-card";

        div.innerHTML = `
            <div class="top-row">
                <img class="favicon" src="${favicon}">
                <a href="${d.url}" target="_blank">${domain}</a>
            </div>

            <div class="actions">
                <button onclick="addNote('${doc.id}')">➕ Нотатка</button>
                <input type="file" onchange="uploadImage(event,'${doc.id}')">

                ${d.image ? `<button onclick="deleteImage('${doc.id}')">🗑 Фото</button>` : ""}

                <button class="delete-btn" onclick="deleteSite('${doc.id}')">❌</button>
            </div>

            ${d.image ? `<img class="preview-img" src="${d.image}">` : ""}

            <div class="note-box">
                ${(d.notes||[]).map((n,i)=>`
                    <div class="note">
                        <span>${n.text}</span>
                        <button onclick="deleteNote('${doc.id}',${i})">❌</button>
                    </div>
                `).join("")}
            </div>
        `;

        list.appendChild(div);
    });
});

</script>
