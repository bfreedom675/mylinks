<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MyLinks Firebase</title>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<style>
body{
    margin:0;
    font-family: Arial;
    background: linear-gradient(135deg,#f7f0ff,#ffe6f2);
    display:flex;
    justify-content:center;
    min-height:100vh;
}

.container{
    width:90%;
    max-width:800px;
    background:#fff;
    padding:25px;
    border-radius:20px;
    margin:20px 0;
}

h1{ text-align:center; color:#6a3df0; }

.add-box{
    display:flex;
    gap:10px;
    margin-bottom:20px;
}

.add-box input{
    flex:1;
    padding:10px;
    border-radius:10px;
    border:1px solid #ddd;
}

.add-box button{
    background:#6a3df0;
    color:white;
    border:none;
    padding:10px 15px;
    border-radius:10px;
}

.link-card{
    border:1px solid #eee;
    padding:15px;
    border-radius:15px;
    margin:15px 0;
    background:#fafaff;
}

.top-row{
    display:flex;
    gap:10px;
    align-items:center;
}

.favicon{ width:32px; }

.actions{
    margin-top:10px;
    display:flex;
    gap:10px;
    flex-wrap:wrap;
}

button{
    border:none;
    background:#6a3df0;
    color:white;
    padding:6px 10px;
    border-radius:8px;
    cursor:pointer;
    font-size:12px;
}

.delete{
    background:transparent;
    color:#6a3df0;
    border:1px solid #ddd;
}

.note{
    background:#f3f3ff;
    padding:6px;
    margin-top:5px;
    border-radius:8px;
    display:flex;
    justify-content:space-between;
}
</style>
</head>

<body>

<div class="container">

<h1>🌐 MyLinks Firebase</h1>

<div class="add-box">
    <input id="urlInput" placeholder="Додай сайт (https://...)">
    <button onclick="addSite()">➕</button>
</div>

<div id="list"></div>

</div>

<script>
// 🔥 ТВОЯ FIREBASE КОНФІГУРАЦІЯ
const firebaseConfig = {
  apiKey: "AIzaSyAccAxcis95_-So-VZivM7D1ene56Eq-x0",
  authDomain: "mylinks-1f843.firebaseapp.com",
  projectId: "mylinks-1f843",
  storageBucket: "mylinks-1f843.firebasestorage.app",
  messagingSenderId: "138024507959",
  appId: "1:138024507959:web:38d54a425786f4669a3db2",
  measurementId: "G-LRDQYTHY4P"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const linksRef = db.collection("links");

// ➕ ДОДАТИ САЙТ
function addSite(){
    const url = document.getElementById("urlInput").value.trim();
    if(!url) return;

    linksRef.add({
        url,
        image: null,
        notes: [],
        createdAt: Date.now()
    });

    document.getElementById("urlInput").value = "";
}

// 📝 ДОДАТИ НОТАТКУ
function addNote(id){
    const text = prompt("Нотатка:");
    if(!text) return;

    const doc = linksRef.doc(id);

    doc.get().then(snap=>{
        let data = snap.data();
        let notes = data.notes || [];
        notes.push(text);

        doc.update({notes});
    });
}

// 🗑 ВИДАЛИТИ НОТАТКУ
function deleteNote(id,index){
    const doc = linksRef.doc(id);

    doc.get().then(snap=>{
        let data = snap.data();
        data.notes.splice(index,1);
        doc.update({notes:data.notes});
    });
}

// 🖼 ЗАВАНТАЖИТИ ФОТО
function uploadImage(e,id){
    const file = e.target.files[0];
    if(!file) return;

    const reader = new FileReader();
    reader.onload = function(){
        linksRef.doc(id).update({
            image: reader.result
        });
    };
    reader.readAsDataURL(file);
}

// 🗑 ВИДАЛИТИ ФОТО
function deleteImage(id){
    linksRef.doc(id).update({image:null});
}

// 🔄 РЕАЛЬНИЙ ЧАС
linksRef.onSnapshot(snapshot=>{
    const list = document.getElementById("list");
    list.innerHTML = "";

    snapshot.forEach(doc=>{
        const d = doc.data();

        const domain = d.url.includes("://") ? new URL(d.url).hostname : d.url;
        const favicon = `https://www.google.com/s2/favicons?sz=64&domain=${domain}`;

        const div = document.createElement("div");
        div.className = "link-card";

        div.innerHTML = `
            <div class="top-row">
                <img class="favicon" src="${favicon}">
                <a href="${d.url}" target="_blank">${domain}</a>
            </div>

            <div class="actions">
                <button onclick="addNote('${doc.id}')">➕ Нотатка</button>
                <input type="file" onchange="uploadImage(event,'${doc.id}')">
                ${d.image ? `<button onclick="deleteImage('${doc.id}')">🗑 Фото</button>` : ""}
            </div>

            ${d.image ? `<img src="${d.image}" style="max-width:150px;border-radius:10px;">` : ""}

            <div>
                ${(d.notes || []).map((n,i)=>`
                    <div class="note">
                        <span>${n}</span>
                        <button class="delete" onclick="deleteNote('${doc.id}',${i})">❌</button>
                    </div>
                `).join("")}
            </div>
        `;

        list.appendChild(div);
    });
});
</script>

</body>
</html>
