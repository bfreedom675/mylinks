ml lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🌐 Мої посилання (PRO Notes)</title>

<style>
body{
    margin:0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg,#f7f0ff,#ffe6f2);
    display:flex;
    justify-content:center;
    min-height:100vh;
}

.container{
    width:95%;
    max-width:900px;
    background:#fff;
    padding:25px;
    border-radius:20px;
    margin:20px 0;
    box-shadow:0 10px 30px rgba(0,0,0,0.1);
}

h1{
    text-align:center;
    color:#6a3df0;
}

.add-box{
    display:flex;
    gap:10px;
    margin-bottom:10px;
}

.add-box input{
    flex:1;
    padding:10px;
    border-radius:10px;
    border:1px solid #ddd;
}

button{
    background:#6a3df0;
    color:white;
    border:none;
    padding:8px 10px;
    border-radius:8px;
    cursor:pointer;
    font-size:12px;
}

.search-box{
    margin-bottom:15px;
    display:flex;
    gap:10px;
}

.search-box input{
    flex:1;
    padding:10px;
    border-radius:10px;
    border:1px solid #ddd;
}

.link-card{
    border:1px solid #eee;
    border-radius:15px;
    padding:15px;
    margin:15px 0;
    background:#fafaff;
}

.top-row{
    display:flex;
    align-items:center;
    gap:10px;
}

.favicon{width:32px;height:32px;}

a{
    color:#333;
    font-weight:bold;
    text-decoration:none;
}

.note-box{
    margin-top:10px;
}

.note{
    background:#f3f3ff;
    padding:8px;
    margin-top:6px;
    border-radius:8px;
    font-size:13px;
}

.tags{
    font-size:11px;
    color:#6a3df0;
    margin-top:3px;
}

.toolbar{
    display:flex;
    gap:5px;
    flex-wrap:wrap;
    margin-top:5px;
}

.footer{
    text-align:center;
    margin-top:20px;
    font-size:12px;
    color:#888;
}
</style>
</head>

<body>

<div class="container">

<h1>🌐 PRO Нотатки</h1>

<div class="add-box">
    <input id="newUrl" placeholder="Встав посилання">
    <button onclick="addSite()">➕</button>
</div>

<div class="search-box">
    <input id="search" placeholder="Пошук по тексту / тегах" oninput="render()">
</div>

<div id="list"></div>

</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyAccAxcis95_-So-VZivM7D1ene56Eq-x0",
  authDomain: "mylinks-1f843.firebaseapp.com",
  projectId: "mylinks-1f843",
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const col = db.collection("links");

let cache = [];

// ===== ADD SITE =====
function addSite(){
    const url = document.getElementById("newUrl").value.trim();
    if(!url) return alert("Встав URL!");

    const id = btoa(url);

    col.doc(id).set({
        url,
        image:null,
        tags:[],
        notes:[],
        created:Date.now()
    });

    document.getElementById("newUrl").value="";
}

// ===== DELETE SITE =====
function deleteSite(id){
    if(confirm("Видалити весь сайт?")){
        col.doc(id).delete();
    }
}

// ===== NOTES =====
function addNote(id){
    const text = prompt("Текст нотатки:");
    if(!text) return;

    const tags = prompt("Теги через кому:") || "";

    col.doc(id).get().then(doc=>{
        const d = doc.data();

        d.notes.push({
            id:Date.now(),
            text,
            tags:tags.split(",").map(t=>t.trim()),
            style:{fontSize:"14px",fontFamily:"Arial"},
            subnotes:[]
        });

        col.doc(id).update({notes:d.notes});
    });
}

// ===== EDIT NOTE =====
function editNote(siteId,noteId){
    col.doc(siteId).get().then(doc=>{
        const d = doc.data();
        const note = d.notes.find(n=>n.id===noteId);

        note.text = prompt("Редагувати:", note.text) || note.text;

        const tags = prompt("Теги:", note.tags.join(",")) || "";
        note.tags = tags.split(",").map(t=>t.trim());

        col.doc(siteId).update({notes:d.notes});
    });
}

// ===== DELETE NOTE =====
function deleteNote(siteId,noteId){
    if(!confirm("Видалити нотатку?")) return;

    col.doc(siteId).get().then(doc=>{
        const d = doc.data();
        d.notes = d.notes.filter(n=>n.id!==noteId);
        col.doc(siteId).update({notes:d.notes});
    });
}

// ===== SUBNOTE =====
function addSubnote(siteId,noteId){
    const text = prompt("Примітка:");
    if(!text) return;

    col.doc(siteId).get().then(doc=>{
        const d = doc.data();
        const note = d.notes.find(n=>n.id===noteId);

        note.subnotes.push({
            id:Date.now(),
            text,
            tags:[]
        });

        col.doc(siteId).update({notes:d.notes});
    });
}

// ===== EDIT SUBNOTE =====
function editSubnote(siteId,noteId,subId){
    col.doc(siteId).get().then(doc=>{
        const d = doc.data();
        const note = d.notes.find(n=>n.id===noteId);
        const sub = note.subnotes.find(s=>s.id===subId);

        sub.text = prompt("Редагувати:", sub.text) || sub.text;

        col.doc(siteId).update({notes:d.notes});
    });
}

// ===== DELETE SUBNOTE =====
function deleteSubnote(siteId,noteId,subId){
    if(!confirm("Видалити примітку?")) return;

    col.doc(siteId).get().then(doc=>{
        const d = doc.data();
        const note = d.notes.find(n=>n.id===noteId);
        note.subnotes = note.subnotes.filter(s=>s.id!==subId);

        col.doc(siteId).update({notes:d.notes});
    });
}

// ===== SEARCH =====
function matchSearch(data,q){
    q = q.toLowerCase();

    return data.url.toLowerCase().includes(q) ||
    (data.notes||[]).some(n=>
        n.text.toLowerCase().includes(q) ||
        (n.tags||[]).join(" ").toLowerCase().includes(q) ||
        (n.subnotes||[]).some(s=>s.text.toLowerCase().includes(q))
    );
}

// ===== RENDER =====
function render(){
    const list = document.getElementById("list");
    const q = document.getElementById("search").value.trim().toLowerCase();

    list.innerHTML="";

    cache.forEach(doc=>{
        const d = doc.data();
        if(q && !matchSearch(d,q)) return;

        const domain = new URL(d.url).hostname;
        const favicon = `https://www.google.com/s2/favicons?sz=64&domain=${domain}`;

        const div = document.createElement("div");
        div.className="link-card";

        div.innerHTML=`
            <div class="top-row">
                <img class="favicon" src="${favicon}">
                <a href="${d.url}" target="_blank">${domain}</a>
                <button onclick="deleteSite('${doc.id}')">❌</button>
            </div>

            <div class="toolbar">
                <button onclick="addNote('${doc.id}')">+ нотатка</button>
            </div>

            <div class="note-box">
                ${(d.notes||[]).map(n=>`
                    <div class="note">
                        <b>${n.text}</b><br>

                        <div class="tags">#${(n.tags||[]).join(" #")}</div>

                        <div>
                            <button onclick="editNote('${doc.id}',${n.id})">✏️</button>
                            <button onclick="deleteNote('${doc.id}',${n.id})">🗑</button>
                            <button onclick="addSubnote('${doc.id}',${n.id})">+ примітка</button>
                        </div>

                        ${(n.subnotes||[]).map(s=>`
                            <div style="margin-left:15px;margin-top:5px;">
                                - ${s.text}
                                <button onclick="editSubnote('${doc.id}',${n.id},${s.id})">✏️</button>
                                <button onclick="deleteSubnote('${doc.id}',${n.id},${s.id})">🗑</button>
                            </div>
                        `).join("")}
                    </div>
                `).join("")}
            </div>
        `;

        list.appendChild(div);
    });
}

// ===== REALTIME =====
col.onSnapshot(snapshot=>{
    cache=[];
    snapshot.forEach(d=>cache.push(d));
    render();
});
</script>

</body>
</html>
